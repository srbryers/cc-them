name: Validate Profiles

on:
  pull_request:
    paths:
      - 'profiles/**'
      - 'scripts/validate.js'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate all profiles
        run: node scripts/validate.js